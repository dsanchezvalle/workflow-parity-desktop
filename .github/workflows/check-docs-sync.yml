# CORE: agnostic
# Structural check: every skill listed in CLAUDE.md exists, every workflow file
# is referenced. Bidirectional. Runs on PRs and pushes to develop.
name: Check Docs Sync

on:
  pull_request:
    branches: [develop]
    types: [opened, reopened, synchronize]
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify skill index
        run: |
          set -euo pipefail
          missing=0
          # Skills are directory-form: .claude/skills/<name>/SKILL.md. Every
          # one must be referenced via its full link path in CLAUDE.md. Plain
          # mentions of the skill name in prose do not count.
          shopt -s nullglob
          for f in .claude/skills/*/SKILL.md; do
            name=$(basename "$(dirname "$f")")
            if ! grep -q "\.claude/skills/$name/SKILL\.md" CLAUDE.md; then
              echo "::error file=CLAUDE.md::skill '$name' is not referenced in CLAUDE.md"
              missing=1
            fi
          done
          # Every link from CLAUDE.md to .claude/skills/<name>/SKILL.md must resolve.
          while IFS= read -r path; do
            if [ ! -f "$path" ]; then
              echo "::error file=CLAUDE.md::referenced skill file '$path' does not exist"
              missing=1
            fi
          done < <(grep -oE '\.claude/skills/[a-zA-Z0-9_.-]+/SKILL\.md' CLAUDE.md | sort -u)
          exit $missing

      - name: Verify workflows referenced in AGENTS.md
        run: |
          set -euo pipefail
          missing=0
          for wf in .github/workflows/*.yml; do
            name=$(basename "$wf" .yml)
            if ! grep -q "$name" AGENTS.md; then
              echo "::error file=AGENTS.md::workflow '$name' is not described in AGENTS.md"
              missing=1
            fi
          done
          exit $missing

      - name: Co-change enforcement (workflows ↔ docs)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE_REF="origin/${{ github.base_ref }}"
          # Shallow checkouts may not include the merge-base; unshallow so
          # the three-dot diff resolves correctly on all PRs.
          git fetch --unshallow origin "${{ github.base_ref }}" 2>/dev/null \
            || git fetch origin "${{ github.base_ref }}"
          changed=$(git diff --name-only "$BASE_REF"...HEAD)
          workflow_changed=$(echo "$changed" | grep -E '^\.github/workflows/' || true)
          docs_changed=$(echo "$changed" | grep -E '^(CLAUDE\.md|AGENTS\.md)$' || true)
          if [ -n "$workflow_changed" ] && [ -z "$docs_changed" ]; then
            echo "::error::workflow files changed without corresponding update to CLAUDE.md or AGENTS.md"
            echo "Changed workflow(s):"
            echo "$workflow_changed" | sed 's/^/  - /'
            exit 1
          fi
